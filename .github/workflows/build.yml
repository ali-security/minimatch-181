name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seal Security Fix
        uses: seal-community/cli-action@latest
        with:
          mode: fix
          fix_mode: remote
          token: ${{ secrets.SEAL_TOKEN }}
          project: minimatch-181
          target: package.json

      - name: Run tests
        run: npm test
